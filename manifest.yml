name: Protein Design Suite
category: Interactive Apps
subcategory: Protein Engineering
role: batch_connect
metadata:
  pintype: Interactive Apps
description: |
  Run <a href="https://github.com/RosettaCommons/RFdiffusion" target="_blank">RFdiffusion</a> or <a href="https://github.com/HannesStark/boltzgen" target="_blank">BoltzGen</a> on GPU nodes — no command line needed.

  <b>RFdiffusion</b> — diffusion-based de novo protein design: binder design, motif scaffolding, partial diffusion, unconditional generation, and symmetric oligomers.

  <b>BoltzGen</b> — universal binder design for proteins, peptides, nanobodies, antibodies, and small molecules.

  All backend configuration and GPU resource management is handled automatically. Results are provided as PDB/CIF files with full trajectory information.
  